name: Weather Agent

on:
  workflow_dispatch:

jobs:
  run-weather-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      WEATHER_CITY_QUERY: Hanoi,VN
      WEATHER_UNITS: metric
      WEATHER_LANG: vi
      WEATHER_PAYMENT_MODE: mppx
      ENABLE_GPT_SUMMARY: "false"
      MPPX_COMMAND_TIMEOUT_SECONDS: "120"
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: node_mppx/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          python -m pip install -r requirements-lock.txt
          python -m pip install --no-build-isolation -e .

      - name: Install Node dependencies
        working-directory: node_mppx
        run: npm ci

      - name: Install Tempo CLI
        run: |
          set -euo pipefail

          install_success=0
          for attempt in 1 2 3; do
            echo "Installing Tempo CLI (attempt ${attempt}/3)"
            if curl -fsSL https://tempo.xyz/install | bash; then
              install_success=1
              break
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep_seconds=$((attempt * 5))
              echo "Tempo CLI install failed; retrying in ${sleep_seconds}s"
              sleep "$sleep_seconds"
            fi
          done

          if [ "$install_success" -ne 1 ]; then
            echo "::error::Tempo CLI install failed after 3 attempts"
            exit 1
          fi

          for tempo_dir in "$HOME/.tempo/bin" "$HOME/.local/bin"; do
            if [ -d "$tempo_dir" ]; then
              echo "$tempo_dir" >> "$GITHUB_PATH"
              case ":$PATH:" in
                *":$tempo_dir:"*) ;;
                *) export PATH="$tempo_dir:$PATH" ;;
              esac
            fi
          done

          tempo_path="$(command -v tempo || true)"
          if [ -z "$tempo_path" ]; then
            tempo_path="$(find "$HOME/.tempo" "$HOME/.local" -type f -name tempo -perm -u+x 2> /dev/null | head -n 1 || true)"
            if [ -n "$tempo_path" ]; then
              tempo_dir="$(dirname "$tempo_path")"
              echo "$tempo_dir" >> "$GITHUB_PATH"
              export PATH="$tempo_dir:$PATH"
            fi
          fi

          tempo_path="$(command -v tempo || true)"
          if [ -z "$tempo_path" ]; then
            echo "::error::Tempo CLI install completed but tempo was not found in PATH"
            echo "PATH=$PATH"
            exit 127
          fi

          echo "Tempo CLI found at: $tempo_path"
          tempo --version || echo "tempo --version is not supported or failed; continuing"

      - name: Restore Tempo accounts CLI store
        env:
          TEMPO_ACCOUNTS_CLI_STORE_B64_PART1: ${{ secrets.TEMPO_ACCOUNTS_CLI_STORE_B64_PART1 }}
          TEMPO_ACCOUNTS_CLI_STORE_B64_PART2: ${{ secrets.TEMPO_ACCOUNTS_CLI_STORE_B64_PART2 }}
        run: |
          test -n "$TEMPO_ACCOUNTS_CLI_STORE_B64_PART1"
          mkdir -p "$HOME/.tempo/wallet"
          chmod 700 "$HOME/.tempo"
          chmod 700 "$HOME/.tempo/wallet"
          printf '%s%s' "$TEMPO_ACCOUNTS_CLI_STORE_B64_PART1" "$TEMPO_ACCOUNTS_CLI_STORE_B64_PART2" | base64 --decode > "$HOME/.tempo/wallet/store.json"
          chmod 600 "$HOME/.tempo/wallet/store.json"
          echo "Tempo wallet store restored"

      - name: Check restored Tempo wallet
        run: |
          tempo_path="$(command -v tempo || true)"
          if [ -z "$tempo_path" ]; then
            echo "::error::Tempo CLI is not available in PATH before checking the restored wallet"
            echo "PATH=$PATH"
            exit 127
          fi
          echo "Tempo CLI found at: $tempo_path"

          set +e
          tempo wallet --format json whoami > /tmp/tempo-whoami.stdout 2> /tmp/tempo-whoami.stderr
          code=$?
          if [ "$code" -ne 0 ]; then
            echo "tempo wallet whoami failed with exit_code=$code"
            echo "stdout:"
            python scripts/redact_ci_log.py /tmp/tempo-whoami.stdout
            echo "stderr:"
            python scripts/redact_ci_log.py /tmp/tempo-whoami.stderr
            exit "$code"
          fi
          python scripts/check_tempo_whoami.py /tmp/tempo-whoami.stdout /tmp/tempo-whoami.stderr

      - name: Run Weather Agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m weather_agent
